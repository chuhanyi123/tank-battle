<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>坦克大战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #00ff88;
      overflow: hidden;
    }
    #header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 10px;
    }
    #title {
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
      letter-spacing: 4px;
    }
    #hud {
      display: flex;
      gap: 30px;
      font-size: 16px;
      margin-bottom: 10px;
    }
    #hud span { color: #fff; }
    #hud .label { color: #00ff88; }
    canvas {
      border: 2px solid #00ff88;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #overlay h1 {
      font-size: 48px;
      text-shadow: 0 0 15px #00ff88;
      margin-bottom: 20px;
    }
    #overlay p {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 30px;
      text-align: center;
      line-height: 1.8;
    }
    #startBtn {
      padding: 12px 40px;
      font-size: 20px;
      background: transparent;
      border: 2px solid #00ff88;
      color: #00ff88;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      transition: all 0.3s;
    }
    #startBtn:hover {
      background: #00ff88;
      color: #000;
    }
    #controls {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
      text-align: center;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="header"><div id="title">坦克大战</div></div>
  <div id="hud">
    <div><span class="label">SCORE:</span> <span id="score">0</span></div>
    <div><span class="label">LEVEL:</span> <span id="level">1</span></div>
    <div><span class="label">LIVES:</span> <span id="lives">3</span></div>
    <div><span class="label">ENEMIES:</span> <span id="enemies">0</span></div>
  </div>
  <canvas id="game"></canvas>
  <div id="controls">WASD / 方向键 移动 &nbsp;|&nbsp; 空格 / ↑ 发炮 &nbsp;|&nbsp; P 暂停</div>

  <div id="overlay">
    <h1 id="overlayTitle">坦克大战</h1>
    <p id="overlayDesc">
      WASD 或 方向键 移动坦克<br>
      空格键 或 ↑ 发炮<br>
      消灭所有敌方坦克！
    </p>
    <button id="startBtn" onclick="startGame()">开始游戏</button>
  </div>

<script>
// ============ CONSTANTS ============
const TILE = 40;
const COLS = 26;
const ROWS = 20;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

// Tile types
const EMPTY = 0, BRICK = 1, STEEL = 2, WATER = 3, TREE = 4, BASE = 5;
const BRICK_H = 5, STEEL_H = 20, WATER_H = 8;

// Direction vectors
const DIRS = [
  { x: 0, y: -1 }, // up
  { x: 1, y: 0 },  // right
  { x: 0, y: 1 },  // down
  { x: -1, y: 0 }  // left
];

// ============ GAME STATE ============
let map, player, enemies, bullets, particles, explosions;
let score, lives, level, totalEnemiesKilled, gameOver, paused;
let enemySpawnTimer, enemySpawnInterval, spawnQueue;
let keys = {};
let lastTime = 0;
let baseHP = 3;
let powerups = [];
let playerPowerupTimer = 0;
let animFrame = 0;

// Tank class
class Tank {
  constructor(x, y, dir, isPlayer) {
    this.x = x; this.y = y;
    this.dir = dir; // 0=up,1=right,2=down,3=left
    this.isPlayer = isPlayer;
    this.w = TILE; this.h = TILE;
    this.speed = isPlayer ? 2.5 : 1.5;
    this.fireCD = 0;
    this.maxCD = isPlayer ? 20 : 80 + Math.random() * 60;
    this.alive = true;
    this.aiTimer = 0;
    this.aiMoveTimer = 0;
    this.stuckTimer = 0;
    this.lastX = x; this.lastY = y;
    this.hasPower = false;
  }

  update() {
    if (!this.alive) return;
    if (this.fireCD > 0) this.fireCD--;
    if (this.playerPowerupTimer > 0) this.playerPowerupTimer--;

    if (this.isPlayer) {
      this.handlePlayerInput();
    } else {
      this.handleAI();
    }

    this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));
    this.y = Math.max(0, Math.min(canvas.height - this.h, this.y));

    // Check if stuck
    if (Math.abs(this.x - this.lastX) < 0.1 && Math.abs(this.y - this.lastY) < 0.1) {
      this.stuckTimer++;
    } else {
      this.stuckTimer = 0;
    }
    this.lastX = this.x; this.lastY = this.y;

    // Powerup expiry
    if (this.hasPower && this.isPlayer) {
      if (this.playerPowerupTimer <= 0) this.hasPower = false;
    }
  }

  handlePlayerInput() {
    let dx = 0, dy = 0;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) { dy = -1; this.dir = 0; }
    else if (keys['ArrowDown'] || keys['s'] || keys['S']) { dy = 1; this.dir = 2; }
    else if (keys['ArrowLeft'] || keys['a'] || keys['A']) { dx = -1; this.dir = 3; }
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx = 1; this.dir = 1; }

    if (dx !== 0 || dy !== 0) {
      let nx = this.x + dx * this.speed;
      let ny = this.y + dy * this.speed;
      if (!this.collidesMap(nx, this.y)) this.x = nx;
      if (!this.collidesMap(this.x, ny)) this.y = ny;
    }

    if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']) && this.fireCD <= 0) {
      this.shoot();
      this.fireCD = this.maxCD;
    }
  }

  handleAI() {
    this.aiTimer++;
    this.aiMoveTimer++;

    // Change direction periodically
    if (this.aiMoveTimer > 60 + Math.random() * 80 || this.stuckTimer > 15) {
      this.aiMoveTimer = 0;
      // Try to turn toward player sometimes
      if (Math.random() < 0.6 && player.alive) {
        const px = player.x + TILE / 2;
        const py = player.y + TILE / 2;
        const tx = this.x + TILE / 2;
        const ty = this.y + TILE / 2;
        if (Math.abs(px - tx) > Math.abs(py - ty)) {
          this.dir = px > tx ? 1 : 3;
        } else {
          this.dir = py > ty ? 2 : 0;
        }
      } else {
        this.dir = Math.floor(Math.random() * 4);
      }
    }

    const d = DIRS[this.dir];
    let nx = this.x + d.x * this.speed;
    let ny = this.y + d.y * this.speed;

    // Random stop
    if (Math.random() < 0.02) return;

    if (!this.collidesMap(nx, this.y)) this.x = nx;
    else { this.dir = (this.dir + 1) % 4; this.stuckTimer = 0; }

    if (!this.collidesMap(this.x, ny)) this.y = ny;
    else { this.dir = (this.dir + 1) % 4; this.stuckTimer = 0; }

    // Shoot
    if (this.fireCD <= 0 && Math.random() < 0.05) {
      this.shoot();
      this.fireCD = this.maxCD;
    }
  }

  collidesMap(x, y) {
    const corners = [
      { x: x + 2, y: y + 2 },
      { x: x + TILE - 3, y: y + 2 },
      { x: x + 2, y: y + TILE - 3 },
      { x: x + TILE - 3, y: y + TILE - 3 }
    ];
    for (const c of corners) {
      const tx = Math.floor(c.x / TILE);
      const ty = Math.floor(c.y / TILE);
      if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return true;
      const t = map[ty][tx];
      if (t === BRICK || t === STEEL) return true;
    }
    return false;
  }

  collidesWith(other) {
    return this.alive && other.alive &&
      this.x < other.x + other.w && this.x + this.w > other.x &&
      this.y < other.y + other.h && this.y + this.h > other.y;
  }

  shoot() {
    const cx = this.x + TILE / 2;
    const cy = this.y + TILE / 2;
    const d = DIRS[this.dir];
    bullets.push(new Bullet(
      cx + d.x * TILE / 2, cy + d.y * TILE / 2,
      d.x * 6, d.y * 6, this.isPlayer, this.hasPower
    ));
  }

  draw() {
    if (!this.alive) return;
    ctx.save();
    ctx.translate(this.x + TILE / 2, this.y + TILE / 2);
    ctx.rotate(this.dir * Math.PI / 2);

    const col = this.isPlayer
      ? (this.hasPower ? '#ffff00' : '#00ff88')
      : `hsl(${Math.floor(this.x / TILE * 20 + this.y / TILE * 15) % 360}, 70%, 55%)`;

    // Body
    ctx.fillStyle = col;
    ctx.fillRect(-TILE / 2 + 4, -TILE / 2 + 4, TILE - 8, TILE - 8);

    // Treads
    ctx.fillStyle = '#333';
    ctx.fillRect(-TILE / 2, -TILE / 2 + 4, 4, TILE - 8);
    ctx.fillRect(TILE / 2 - 4, -TILE / 2 + 4, 4, TILE - 8);

    // Turret
    ctx.fillStyle = '#fff';
    ctx.fillRect(-3, -TILE / 2 - 2, 6, TILE / 2 + 2);

    // Center
    ctx.fillStyle = '#000';
    ctx.fillRect(-2, -2, 4, 4);

    ctx.restore();

    // Glow for powerup
    if (this.hasPower) {
      ctx.save();
      ctx.globalAlpha = 0.3 + 0.2 * Math.sin(Date.now() / 100);
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 2;
      ctx.strokeRect(this.x, this.y, TILE, TILE);
      ctx.restore();
    }
  }

  hit(damage) {
    if (this.hasPower && this.isPlayer) {
      return false; // survives
    }
    this.alive = false;
    createExplosion(this.x + TILE / 2, this.y + TILE / 2, this.isPlayer ? '#00ff88' : '#ff4444');
    return true;
  }
}

// Bullet class
class Bullet {
  constructor(x, y, vx, vy, fromPlayer, power) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.fromPlayer = fromPlayer;
    this.alive = true;
    this.power = power;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;

    // Out of bounds
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.alive = false;
      return;
    }

    const tx = Math.floor(this.x / TILE);
    const ty = Math.floor(this.y / TILE);
    if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) { this.alive = false; return; }

    const t = map[ty][tx];
    if (t === BRICK) {
      this.alive = false;
      map[ty][tx] = EMPTY;
      createExplosion(this.x, this.y, '#aa8844');
      score += 1;
    } else if (t === STEEL) {
      if (this.power) {
        this.alive = false;
        map[ty][tx] = EMPTY;
        createExplosion(this.x, this.y, '#aaa');
      }
    }

    // Hit tanks
    if (this.fromPlayer) {
      for (const e of enemies) {
        if (e.alive && this.hitsTank(e)) {
          this.alive = false;
          if (e.hit()) {
            score += 100 + level * 10;
            totalEnemiesKilled++;
            // Drop powerup
            if (Math.random() < 0.15) spawnPowerup(e.x, e.y);
          }
        }
      }
    } else {
      if (player.alive && this.hitsTank(player)) {
        this.alive = false;
        if (player.hit()) {
          lives--;
          if (lives > 0) {
            setTimeout(() => respawnPlayer(), 1500);
          } else {
            gameOver = true;
            showOverlay('游戏结束', `最终得分: ${score}<br>消灭敌人: ${totalEnemiesKilled}`, '再来一次');
          }
        }
      }
    }
  }

  hitsTank(tank) {
    return this.x > tank.x && this.x < tank.x + tank.w &&
           this.y > tank.y && this.y < tank.y + tank.h;
  }

  draw() {
    ctx.fillStyle = this.fromPlayer ? '#00ff88' : '#ff4444';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Powerup class
const PowerupTypes = ['shield', 'rapid', 'bomb'];
class Powerup {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type;
    this.alive = true;
    this.timer = 0;
  }
  update() {
    this.timer++;
    if (this.timer > 600) this.alive = false;
    if (player.alive && player.x < this.x + TILE && player.x + TILE > this.x &&
        player.y < this.y + TILE && player.y + TILE > this.y) {
      this.alive = false;
      applyPowerup(this.type);
    }
  }
  draw() {
    ctx.save();
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 150);
    ctx.globalAlpha = this.timer > 540 ? (600 - this.timer) / 60 : 1;
    ctx.fillStyle = this.type === 'shield' ? '#00aaff'
                   : this.type === 'rapid' ? '#ff8800'
                   : '#ff00ff';
    ctx.fillRect(this.x + 8, this.y + 8, TILE - 16, TILE - 16);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(this.x + 8, this.y + 8, TILE - 16, TILE - 16);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'center';
    const labels = { shield: '护盾', rapid: '速射', bomb: '炸弹' };
    ctx.fillText(labels[this.type], this.x + TILE / 2, this.y + TILE / 2 + 4);
    ctx.restore();
  }
}

function spawnPowerup(x, y) {
  const type = PowerupTypes[Math.floor(Math.random() * PowerupTypes.length)];
  powerups.push(new Powerup(x, y, type));
}

function applyPowerup(type) {
  if (type === 'shield') {
    player.hasPower = true;
    player.playerPowerupTimer = 600;
  } else if (type === 'rapid') {
    player.maxCD = 5;
    setTimeout(() => { player.maxCD = 20; }, 8000);
  } else if (type === 'bomb') {
    for (const e of enemies) {
      if (e.alive) {
        createExplosion(e.x + TILE / 2, e.y + TILE / 2, '#ff4444');
        e.alive = false;
        score += 100;
        totalEnemiesKilled++;
      }
    }
  }
}

// Particle
function createExplosion(x, y, color) {
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      color,
      size: 2 + Math.random() * 3
    });
  }
  explosions.push({ x, y, r: 5, maxR: 30, life: 15 });
}

// ============ MAP GENERATION ============
function generateMap() {
  map = [];
  for (let y = 0; y < ROWS; y++) {
    map[y] = [];
    for (let x = 0; x < COLS; x++) {
      // Borders
      if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1) {
        map[y][x] = STEEL;
      } else {
        map[y][x] = EMPTY;
      }
    }
  }

  // Base
  const bx = Math.floor(COLS / 2);
  const by = ROWS - 2;
  map[by][bx] = BASE;
  map[by - 1][bx] = BASE;

  // Generate structures
  generateStructures();

  // Water
  placeWater();

  // Trees
  placeTrees();
}

function generateStructures() {
  const patterns = [
    // Horizontal walls
    () => {
      const x = 4 + Math.floor(Math.random() * (COLS - 10));
      const y = 4 + Math.floor(Math.random() * (ROWS - 8));
      const len = 3 + Math.floor(Math.random() * 4);
      for (let i = 0; i < len; i++) {
        if (x + i < COLS - 1) map[y][x + i] = Math.random() < 0.6 ? BRICK : STEEL;
      }
    },
    // Vertical walls
    () => {
      const x = 3 + Math.floor(Math.random() * (COLS - 6));
      const y = 3 + Math.floor(Math.random() * (ROWS - 8));
      const len = 2 + Math.floor(Math.random() * 3);
      for (let i = 0; i < len; i++) {
        if (y + i < ROWS - 1) map[y + i][x] = Math.random() < 0.6 ? BRICK : STEEL;
      }
    },
    // Small fort
    () => {
      const x = 2 + Math.floor(Math.random() * (COLS - 8));
      const y = 2 + Math.floor(Math.random() * (ROWS - 8));
      const w = 2 + Math.floor(Math.random() * 2);
      const h = 2 + Math.floor(Math.random() * 2);
      for (let dy = 0; dy < h; dy++) {
        for (let dx = 0; dx < w; dx++) {
          if (y + dy < ROWS - 1 && x + dx < COLS - 1)
            map[y + dy][x + dx] = Math.random() < 0.5 ? BRICK : STEEL;
        }
      }
    }
  ];

  const numStructures = 8 + Math.floor(Math.random() * 8);
  for (let i = 0; i < numStructures; i++) {
    const p = patterns[Math.floor(Math.random() * patterns.length)];
    p();
  }
}

function placeWater() {
  const clusters = 2 + Math.floor(Math.random() * 2);
  for (let c = 0; c < clusters; c++) {
    const cx = 2 + Math.floor(Math.random() * (COLS - 6));
    const cy = 2 + Math.floor(Math.random() * (ROWS - 8));
    const size = 2 + Math.floor(Math.random() * 3);
    for (let dy = 0; dy < size; dy++) {
      for (let dx = 0; dx < size; dx++) {
        if (map[cy + dy] && map[cy + dy][cx + dx] === EMPTY)
          map[cy + dy][cx + dx] = WATER;
      }
    }
  }
}

function placeTrees() {
  const numTrees = 6 + Math.floor(Math.random() * 8);
  for (let i = 0; i < numTrees; i++) {
    const x = 2 + Math.floor(Math.random() * (COLS - 4));
    const y = 2 + Math.floor(Math.random() * (ROWS - 6));
    if (map[y][x] === EMPTY) map[y][x] = TREE;
  }
}

// ============ SPAWN ENEMIES ============
function getSpawnPositions() {
  return [
    { x: 2 * TILE, y: 0 },
    { x: (COLS / 2 - 1) * TILE, y: 0 },
    { x: (COLS - 3) * TILE, y: 0 }
  ];
}

function spawnEnemy() {
  const positions = getSpawnPositions().filter(p => {
    return !enemies.some(e => Math.abs(e.x - p.x) < TILE);
  });
  if (positions.length === 0) return;
  const pos = positions[Math.floor(Math.random() * positions.length)];
  const enemy = new Tank(pos.x, pos.y, 2, false);
  enemy.speed = 1.2 + level * 0.15;
  enemies.push(enemy);
}

function respawnPlayer() {
  player = new Tank(TILE * 2, (ROWS - 2) * TILE, 0, true);
}

// ============ LEVEL PROGRESSION ============
function checkLevelComplete() {
  const aliveEnemies = enemies.filter(e => e.alive).length;
  if (aliveEnemies === 0 && spawnQueue <= 0) {
    level++;
    if (level > 5) {
      showOverlay('胜利!', `你完成了全部关卡!<br>得分: ${score}`, '重新开始');
      gameOver = true;
      return;
    }
    spawnQueue = Math.min(5 + level, 10);
    generateMap();
    respawnPlayer();
    player.hasPower = false;
    player.playerPowerupTimer = 0;
  }
}

// ============ RENDERING ============
function drawMap() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const t = map[y][x];
      const px = x * TILE, py = y * TILE;

      if (t === BRICK) {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = '#a0522d';
        ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
        ctx.strokeStyle = '#6b3010';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(px + i * 14 + 5, py);
          ctx.lineTo(px + i * 14, py + TILE);
          ctx.stroke();
        }
      } else if (t === STEEL) {
        ctx.fillStyle = '#555';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = '#888';
        ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.strokeRect(px + 1, py + 1, TILE - 2, TILE - 2);
        ctx.beginPath();
        ctx.moveTo(px + TILE / 2, py);
        ctx.lineTo(px + TILE / 2, py + TILE);
        ctx.moveTo(px, py + TILE / 2);
        ctx.lineTo(px + TILE, py + TILE / 2);
        ctx.stroke();
      } else if (t === WATER) {
        const wave = Math.sin(Date.now() / 300 + x + y) * 2;
        ctx.fillStyle = '#1a4a8a';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = '#2a6aaa';
        ctx.fillRect(px + 5, py + 8 + wave, TILE - 10, 4);
        ctx.fillRect(px + 8, py + 20 + wave, TILE - 16, 3);
      } else if (t === TREE) {
        ctx.fillStyle = '#1a3a1a';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = '#2d6b2d';
        ctx.beginPath();
        ctx.arc(px + TILE / 2, py + TILE / 2, TILE / 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a4a1a';
        ctx.beginPath();
        ctx.arc(px + TILE / 2 - 3, py + TILE / 2 - 3, TILE / 5, 0, Math.PI * 2);
        ctx.fill();
      } else if (t === BASE) {
        ctx.fillStyle = '#3a2a00';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(px + 5, py + 5, TILE - 10, TILE - 10);
        ctx.fillStyle = '#ff8800';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('★', px + TILE / 2, py + TILE / 2 + 6);
      } else {
        ctx.fillStyle = '#0d1a0d';
        ctx.fillRect(px, py, TILE, TILE);
        // Grid lines
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(px, py, TILE, TILE);
      }
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawExplosions() {
  for (const e of explosions) {
    const alpha = e.life / 15;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#ff8800';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r * 0.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lives').textContent = lives;
  document.getElementById('enemies').textContent = enemies.filter(e => e.alive).length;
}

// ============ GAME LOOP ============
function update(dt) {
  if (gameOver || paused) return;

  animFrame++;
  if (animFrame % 3 === 0) updateHUD();

  // Spawn enemies
  if (spawnQueue > 0) {
    enemySpawnTimer++;
    if (enemySpawnTimer >= enemySpawnInterval) {
      enemySpawnTimer = 0;
      spawnEnemy();
      spawnQueue--;
    }
  }

  // Update tanks
  if (player.alive) player.update();
  for (const e of enemies) e.update();

  // Update bullets
  for (const b of bullets) if (b.alive) b.update();
  bullets = bullets.filter(b => b.alive);

  // Update particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // Update explosions
  for (const e of explosions) {
    e.r += (e.maxR - e.r) * 0.2;
    e.life--;
  }
  explosions = explosions.filter(e => e.life > 0);

  // Update powerups
  for (const p of powerups) if (p.alive) p.update();
  powerups = powerups.filter(p => p.alive);

  // Enemy-player collision
  for (const e of enemies) {
    if (player.alive && e.alive && player.collidesWith(e)) {
      const d = DIRS[player.dir];
      if (d.x !== 0) player.x += d.x * 2;
      if (d.y !== 0) player.y += d.y * 2;
    }
  }

  // Check level complete
  checkLevelComplete();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawMap();
  drawParticles();
  drawExplosions();
  for (const b of bullets) b.draw();
  for (const e of enemies) e.draw();
  if (player.alive) player.draw();
  for (const p of powerups) p.draw();
}

function gameLoop(ts) {
  const dt = ts - lastTime;
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ============ INIT ============
function initGame() {
  score = 0;
  lives = 3;
  level = 1;
  totalEnemiesKilled = 0;
  gameOver = false;
  paused = false;
  enemies = [];
  bullets = [];
  particles = [];
  explosions = [];
  powerups = [];
  spawnQueue = 5;
  enemySpawnTimer = 0;
  enemySpawnInterval = 120;
  playerPowerupTimer = 0;
  generateMap();
  respawnPlayer();
  // Pre-spawn some enemies
  for (let i = 0; i < 3; i++) spawnEnemy();
  spawnQueue = 5 - 3;
  updateHUD();
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  initGame();
}

function showOverlay(title, desc, btn) {
  document.getElementById('overlayTitle').textContent = title;
  document.getElementById('overlayDesc').innerHTML = desc;
  document.getElementById('startBtn').textContent = btn;
  document.getElementById('overlay').classList.remove('hidden');
}

// Input
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
    if (paused) {
      showOverlay('暂停', '按 P 继续', '继续');
    } else {
      document.getElementById('overlay').classList.add('hidden');
    }
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Start render loop (waiting for game start)
requestAnimationFrame(gameLoop);
</script>
</body>
